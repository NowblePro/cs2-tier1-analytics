services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cs2
      POSTGRES_USER: cs2
      POSTGRES_PASSWORD: cs2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cs2 -d cs2"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://cs2:cs2@db:5432/cs2
    ports:
      - "${WEB_PORT:-8011}:8011"
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
