services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cs2
      POSTGRES_USER: cs2
      POSTGRES_PASSWORD: cs2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cs2 -d cs2"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

